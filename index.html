/* LISTA DE JUEGOS */
.game{
    display:flex;

    justify-content:left;
    margin:15px auto;
    width:600px;
    background:#151515;
    border-radius:10px;
    padding:10px;
    transition:.2s;
}

.game:hover{
    background:#1f1f1f;
}

.game img{
    width:220px;
    height:70px;
    object-fit:cover;
    border-radius:6px;
    margin-right:15px;
}

.game a{
    color:#eaeaea;
    text-decoration:none;
    font-size:20px;
}
