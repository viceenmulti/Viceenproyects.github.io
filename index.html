<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viceen Projects</title>

<style>
body{
    margin:0;
    font-family:system-ui, sans-serif;
    color:#eaeaea;
    text-align:center;

    /* fondo */
    background:url("img/Fondo.jpg") no-repeat center center fixed;
    background-size:cover;
}

/* capa oscura + blur encima del fondo */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(6px);
    z-index:-1;
}

.container{
    margin-top:80px;
}

h1{
    margin-bottom:30px;
}

/* LISTA DE JUEGOS */
.game{
    display:flex;
    align-items:center;
    justify-content:left;
    margin:15px auto;
    width:600px;
    background:#151515;
    border-radius:10px;
    padding:10px;
    transition:.2s;
}

.game:hover{
    background:#1f1f1f;
}

.game img{
    width:220px;
    height:70px;
    object-fit:cover;
    border-radius:6px;
    margin-right:15px;
}

.game a{
    color:#eaeaea;
    text-decoration:none;
    font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Lista de Juegos</h1>

<a href="victoria.html" class="game">
<img src="img/victoriasteam.jpg">
<span>Victoria II</span>
</a>

</div>

</div>

</body>
</html>
